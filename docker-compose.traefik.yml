# Traefik routing overlay — use on top of the base compose file:
#   docker compose -f docker-compose.yml -f docker-compose.traefik.yml up -d
#
# Requires a running Traefik instance attached to the traefik-shared network.

services:
  api-backend:
    labels:
      traefik.enable: "true"
      traefik.http.routers.api-backend.rule: "Host(`api.${DOMAIN}`)"
      traefik.http.routers.api-backend.entrypoints: websecure
      traefik.http.routers.api-backend.tls.certresolver: cf
      traefik.http.services.api-backend.loadbalancer.server.port: "8000"
    networks:
      traefik-shared:

  web-app:
    labels:
      traefik.enable: "true"
      traefik.http.routers.web-app.rule: "Host(`${DOMAIN}`)"
      traefik.http.routers.web-app.entrypoints: websecure
      traefik.http.routers.web-app.tls.certresolver: cf
      traefik.http.services.web-app.loadbalancer.server.port: "3000"
    networks:
      traefik-shared:

networks:
  traefik-shared:
    external: true
