services:

  # ── Infrastructure ──────────────────────────────────────────────────

  mongodb:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    networks:
      - foundry
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-foundry}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - foundry
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-foundry}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    networks:
      - foundry
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Backend ─────────────────────────────────────────────────────────

  api-backend:
    build: ./api-backend
    restart: unless-stopped
    environment:
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: ${MONGO_DB}
      VALKEY_URI: ${VALKEY_URI}
      WOM_GROUP_ID: ${WOM_GROUP_ID:-}
      WOM_GROUP_KEY: ${WOM_GROUP_KEY:-}
      WOM_CLAN_NAME: ${WOM_CLAN_NAME:-Iron Foundry}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI}
      GUILD_ID: ${GUILD_ID}
      DISCORD_SERVER_TOKEN: ${DISCORD_SERVER_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
    networks:
      - foundry
    depends_on:
      mongodb:
        condition: service_healthy
      valkey:
        condition: service_healthy

  # ── Discord bots ─────────────────────────────────────────────────────

  discord-server:
    build: ./discord-server
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_SERVER_TOKEN}
      GUILD_ID: ${GUILD_ID}
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: ${MONGO_DB}
      STAFF_ROLE_ID: ${STAFF_ROLE_ID}
      SENIOR_STAFF_ROLE_ID: ${SENIOR_STAFF_ROLE_ID}
      OWNER_ROLE_ID: ${OWNER_ROLE_ID}
      MENTOR_ROLE_ID: ${MENTOR_ROLE_ID}
    networks:
      - foundry
    depends_on:
      mongodb:
        condition: service_healthy

  discord-utils:
    build: ./discord-utils
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_UTILS_TOKEN}
      GUILD_ID: ${GUILD_ID}
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: ${MONGO_DB}
      VALKEY_URI: ${VALKEY_URI}
      STAFF_ROLE_ID: ${STAFF_ROLE_ID}
      SENIOR_STAFF_ROLE_ID: ${SENIOR_STAFF_ROLE_ID}
    networks:
      - foundry
    depends_on:
      mongodb:
        condition: service_healthy
      valkey:
        condition: service_healthy

  discord-event:
    build: ./discord-event
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_EVENT_TOKEN}
      GUILD_ID: ${GUILD_ID}
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: ${MONGO_DB}
      STAFF_ROLE_ID: ${STAFF_ROLE_ID}
      SENIOR_STAFF_ROLE_ID: ${SENIOR_STAFF_ROLE_ID}
      OWNER_ROLE_ID: ${OWNER_ROLE_ID}
    networks:
      - foundry
    depends_on:
      mongodb:
        condition: service_healthy

  # ── Frontend ─────────────────────────────────────────────────────────

  web-app:
    build: ./web-app
    restart: unless-stopped
    environment:
      BUN_PUBLIC_API_URL: ${API_BACKEND_URL}
    networks:
      - foundry

volumes:
  mongodb_data:
  postgres_data:

networks:
  foundry:
    driver: bridge
